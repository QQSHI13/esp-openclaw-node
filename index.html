  <style>
    :root {

      color: var(--bs-body-color);

      background: var(--bs-body-bg);

    .picker-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .field label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--bs-body-color);
    }
    .field select {
      width: 100%;
      min-height: 42px;
      padding: 0.55rem 0.75rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      background: #fff;
      color: var(--bs-body-color);
      font: inherit;
    }
    .selectionSummary {
      margin: 0 0 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      background: var(--bs-surface);
      border: 1px solid var(--bs-border);
    }
    .selectionSummaryTitle {
      margin: 0 0 0.85rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--bs-body-color);
    }
    .selectionGrid {
      display: grid;
      gap: 0.85rem;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .selectionItem {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 0;
    }
    .selectionItemLabel {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--bs-muted);
    }
    .selectionItemValue {
      font-size: 1rem;
      font-weight: 500;
      color: var(--bs-body-color);
      overflow-wrap: anywhere;
    }
    .actions {
      display: flex;
      justify-content: center;
    }
    .connectButton {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      font-weight: 500;
      line-height: 28px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      padding: 6px 16px;
      border-radius: 4px;
      background-color: var(--bs-primary);
      color: #fff;
      text-decoration: none;
      min-width: 300px;
      box-shadow: 0 4px 12px rgba(0, 113, 225, 0.18);
    }
    .connectButton:hover {
      background-color: var(--bs-primary-strong);
    }
    .connectButton[aria-disabled="true"] {
      background: rgba(0, 0, 0, 0.2);
      pointer-events: none;
      box-shadow: none;
    }
    @media (max-width: 780px) {
      .maincontainer {
        padding-top: 1.5rem;
      }
      .picker {
        padding: 1.1rem;
      }
      .picker-grid {
        grid-template-columns: 1fr;
      }
      .selectionGrid {
        grid-template-columns: 1fr;
      }
      .connectButton {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="maincontainer">
    <main>
      <section class="hero">
        <h1>ESP OpenClaw Node</h1>
        <p>Select the application, SoC, and dev board you want to flash.</p>
      </section>

      <section class="panel">
        <div class="panel-accent"></div>
        <div class="picker">
          <p class="selectionTitle">Choose your target</p>
          <div class="picker-grid">
            <div class="field">
              <label for="appSelect">Application</label>
              <select id="appSelect"></select>
            </div>
            <div class="field">
              <label for="socSelect">SoC</label>
              <select id="socSelect"></select>
            </div>
            <div class="field">
              <label for="boardSelect">Dev Board</label>
              <select id="boardSelect"></select>
            </div>
          </div>

          <div class="selectionSummary">
            <p class="selectionSummaryTitle">Selected target</p>
            <div class="selectionGrid">
              <div class="selectionItem">
                <span class="selectionItemLabel">Application</span>
                <span id="selectionApplication" class="selectionItemValue">Choose an application</span>
              </div>
              <div class="selectionItem">
                <span class="selectionItemLabel">SoC</span>
                <span id="selectionSoc" class="selectionItemValue">Choose a SoC</span>
              </div>
              <div class="selectionItem">
                <span class="selectionItemLabel">Dev Board</span>
                <span id="selectionBoard" class="selectionItemValue">Choose a dev board</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <a id="launchButton" class="connectButton" href="#" aria-disabled="true">Open ESP Launchpad</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script id="manifest-data" type="application/json">{

  <script>
    const manifest = JSON.parse(document.getElementById("manifest-data").textContent);
    const params = new URLSearchParams(window.location.search);
    const launchpadBase = params.get("launchpadURL") || manifest.launchpad_url;
    const pageBase = new URL("./", window.location.href);

    const appSelect = document.getElementById("appSelect");
    const socSelect = document.getElementById("socSelect");
    const boardSelect = document.getElementById("boardSelect");
    const launchButton = document.getElementById("launchButton");
    const selectionApplication = document.getElementById("selectionApplication");
    const selectionSoc = document.getElementById("selectionSoc");
    const selectionBoard = document.getElementById("selectionBoard");

    function uniqueEntries(entries, keyName) {
      const seen = new Set();
      return entries.filter((entry) => {
        if (seen.has(entry[keyName])) {
          return false;
        }
        seen.add(entry[keyName]);
        return true;
      });
    }

    function setLinkState(element, href, labelHtml) {
      if (href) {
        element.href = href;
        element.removeAttribute("aria-disabled");
        if (labelHtml) {
          element.innerHTML = labelHtml;
        }
      } else {
        element.href = "#";
        element.setAttribute("aria-disabled", "true");
        if (labelHtml) {
          element.innerHTML = labelHtml;
        }
      }
    }

    function selectedApp() {
      return manifest.apps.find((app) => app.app_id === appSelect.value);
    }

    function selectionsForCurrentApp() {
      const app = selectedApp();
      return app ? app.targets : [];
    }

    function populateApps() {
      appSelect.innerHTML = "";
      for (const app of manifest.apps) {
        const option = document.createElement("option");
        option.value = app.app_id;
        option.textContent = app.app_name;
        appSelect.appendChild(option);
      }
      if (manifest.default_selection?.app_id) {
        appSelect.value = manifest.default_selection.app_id;
      }
    }

    function populateSocs() {
      const selections = selectionsForCurrentApp();
      const socs = uniqueEntries(selections.map((selection) => ({
        soc_slug: selection.soc_slug,
        soc_label: selection.soc_label,
      })), "soc_slug");
      socSelect.innerHTML = "";
      for (const soc of socs) {
        const option = document.createElement("option");
        option.value = soc.soc_slug;
        option.textContent = soc.soc_label;
        socSelect.appendChild(option);
      }
      if (selectedApp()?.app_id === manifest.default_selection?.app_id) {
        socSelect.value = manifest.default_selection.soc_slug;
      }
    }

    function populateBoards() {
      const selections = selectionsForCurrentApp().filter((selection) => selection.soc_slug === socSelect.value);
      const boards = uniqueEntries(selections.map((selection) => ({
        board_slug: selection.board_slug,
        board_name: selection.board_name,
      })), "board_slug");
      boardSelect.innerHTML = "";
      for (const board of boards) {
        const option = document.createElement("option");
        option.value = board.board_slug;
        option.textContent = board.board_name;
        boardSelect.appendChild(option);
      }
      if (
        selectedApp()?.app_id === manifest.default_selection?.app_id &&
        socSelect.value === manifest.default_selection?.soc_slug
      ) {
        boardSelect.value = manifest.default_selection.board_slug;
      }
    }

    function currentSelection() {
      return selectionsForCurrentApp().find((selection) =>
        selection.soc_slug === socSelect.value && selection.board_slug === boardSelect.value
      );
    }

    function updateSelection() {
      const app = selectedApp();
      const selection = currentSelection();
      if (!app || !selection) {
        selectionApplication.textContent = "Choose an application";
        selectionSoc.textContent = "Choose a SoC";
        selectionBoard.textContent = "Choose a dev board";
        setLinkState(launchButton, "", "Open ESP Launchpad");
        return;
      }

      const configUrl = new URL(selection.config_path, pageBase).toString();
      const launchUrl = `${launchpadBase}?flashConfigURL=${encodeURIComponent(configUrl)}`;

      selectionApplication.textContent = app.app_name;
      selectionSoc.textContent = selection.soc_label;
      selectionBoard.textContent = selection.board_name;
      setLinkState(launchButton, launchUrl, "Open ESP Launchpad");
    }

    appSelect.addEventListener("change", () => {
      populateSocs();
      populateBoards();
      updateSelection();
    });
    socSelect.addEventListener("change", () => {
      populateBoards();
      updateSelection();
    });
    boardSelect.addEventListener("change", updateSelection);

    populateApps();
    populateSocs();
    populateBoards();
    updateSelection();
  </script>
</body>
